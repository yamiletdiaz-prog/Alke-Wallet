<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tu billetera digital segura">
    <title>Billetera-virtual - Cargando...</title>

    <!-- 
        ===============================================
        PÁGINA DE REDIRECCIÓN PRINCIPAL
        ===============================================
        Este archivo funciona como punto de entrada de la aplicación.
        Redirige automáticamente a la página de inicio de sesión (login.html)
        para garantizar que los usuarios comiencen en la pantalla correcta.
    -->
    <script>
        // Redirección automática a la página de login
        window.location.href = "login.html";
    </script>
    
    <style>
        /* Estilos básicos para la pantalla de carga */
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        
        .loading-container {
            text-align: center;
            margin-top: 50px;
            color: #333;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- ================= CONTENIDO PRINCIPAL ================= -->
    <main>
        <!-- Sección de mensaje de carga -->
        <section class="loading-container" role="status" aria-live="polite">
            <!-- Indicador visual de carga (spinner) -->
            <div class="spinner" aria-hidden="true"></div>
            
            <!-- Encabezado del mensaje de redirección -->
            <header>
                <h1>Billetera-virtual</h1>
            </header>
            
            <!-- Mensaje informativo para el usuario -->
            <p>Redirigiendo a Billetera-virtual
                ...</p>
            
            <!-- Mensaje alternativo para lectores de pantalla -->
            <p class="visually-hidden">Por favor espere, está siendo redirigido al inicio de sesión</p>
        </section>
    </main>
    
    <!-- Mensaje de respaldo en caso de que JavaScript esté deshabilitado -->
    <noscript>
        <div style="text-align: center; margin-top: 50px; padding: 20px;">
            <p><strong>JavaScript está deshabilitado en tu navegador.</strong></p>
            <p>Por favor, haz clic en el siguiente enlace para continuar:</p>
            <a href="login.html" style="color: #3498db; text-decoration: none; font-weight: bold;">
                Ir a Billetera virtual
            </a>
        </div>
    </noscript>
</body>
</html>
